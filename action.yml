name: 'release-restore-zip'
inputs:
  release_tag:
    required: true
  zip_name:
    required: true
  unzip:
    required: false
    default: false
  output_dir:
    required: false
    default: ./
  github_token:
    required: true
outputs:
  status:
    description: "1=success, 0=failure"
    value: ${{ steps.status.outputs.status }}

runs:
  using: composite
  steps:
    - name: Create output directory
      run: |
        mkdir -p "${{ inputs.output_dir }}"
      shell: bash

    - name: Check asset exists
      run: |
        has_asset=$(gh release view ${{ inputs.release_tag }} --json assets | jq -r --arg name "${{ inputs.zip_name }}" '.assets[] | .name | select(. == $name or startswith($name + ".part-"))' | wc -l)
        if [ $has_asset -eq 0 ]; then
          echo "::error::Asset not found: ${{ inputs.zip_name }}"
          exit 1
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Download assets
      run: |
        gh release download ${{ inputs.release_tag }} -p "${{ inputs.zip_name }}*" --clobber -D "${{ inputs.output_dir }}"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Merge split parts if exist
      run: |
        zip_path="${{ inputs.output_dir }}/${{ inputs.zip_name }}"
        if ls "$zip_path".part-* 1>/dev/null 2>&1; then
          cat "$zip_path".part-* > "$zip_path"
          rm -f "$zip_path".part-*
        fi
      shell: bash

    - name: Unzip if enabled
      if: ${{ inputs.unzip == 'true' }}
      run: |
        unzip -q "${{ inputs.output_dir }}/${{ inputs.zip_name }}" -d "${{ inputs.output_dir }}"
      shell: bash

    - name: Set success status
      id: status
      if: ${{ success() }}
      run: |
        echo "status=1" >> $GITHUB_OUTPUT
      shell: bash

    - name: Set failure status
      id: status
      if: ${{ failure() }}
      run: |
        echo "status=0" >> $GITHUB_OUTPUT
      shell: bash
